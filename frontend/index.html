<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>School AI Template Chatbot</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>School AI Template Chatbot</h1>
      <p>Create Sindhi and English school announcements, press releases, topper lists and official notices.</p>
    </header>

    <main class="layout">
      <section class="panel chat-panel">
        <h2>Prompt</h2>

        <label for="prompt">Enter your request</label>
        <textarea
          id="prompt"
          placeholder="Example: Create a Sindhi press release for annual exam toppers of class 8."
        ></textarea>

        <div class="controls">
          <button id="generateBtn">Generate HTML</button>
          <button id="clearBtn" class="secondary">Clear</button>
        </div>

        <div id="status" class="status"></div>

        <h3>Examples</h3>
        <div class="examples">
          <button class="example">Create an English press release for an official visit to the school.</button>
          <button class="example">Create a Sindhi announcement for monthly test toppers of class 6.</button>
          <button class="example">Create an English staff congratulations post for a newly appointed teacher.</button>
          <button class="example">سالياني امتحان ۾ پهرين، ٻي ۽ ٽئين پوزيشن ماڻيندڙ شاگردن لاءِ سنڌي پوسٽ ٺاهيو.</button>
        </div>
      </section>

      <section class="panel result-panel">
        <div class="result-header">
          <h2>Generated HTML</h2>
          <div>
            <button id="copyBtn" class="secondary">Copy HTML</button>
            <button id="downloadBtn" class="secondary">Download</button>
          </div>
        </div>

        <textarea id="htmlOutput" readonly></textarea>

        <h2>Preview</h2>
        <iframe id="preview"></iframe>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
